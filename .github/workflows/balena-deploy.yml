name: Deploy to balena

# Pushes a new release to the balena fleet on every push to main. ONE-TIME SETUP in the
# GitHub repo settings (Settings → Secrets and variables → Actions):
#   • Secret   BALENA_TOKEN  = a balenaCloud API key (Preferences → Access tokens)
#   • Variable BALENA_FLEET  = your fleet slug, e.g. "youruser/flight-tracker"
#   • Variable HOME_AIRPORT  = your ICAO, e.g. "KSEA" (optional — builds the map overlay)
# Until BALENA_TOKEN/BALENA_FLEET are set this workflow is a no-op safety net.

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Build the aviation map overlay (Airways/Navaids/Fixes) for the configured airport, so
      # nothing airport-specific is committed. Skipped if HOME_AIRPORT isn't set.
      - name: Build navdata overlay
        if: ${{ vars.HOME_AIRPORT != '' }}
        run: python3 tools/build_navdata.py "${{ vars.HOME_AIRPORT }}"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install balena CLI
        run: npm install -g balena-cli
      - name: Push release to the fleet
        env:
          BALENA_TOKEN: ${{ secrets.BALENA_TOKEN }}
          BALENA_FLEET: ${{ vars.BALENA_FLEET }}
        run: |
          if [ -z "$BALENA_TOKEN" ] || [ -z "$BALENA_FLEET" ]; then
            echo "BALENA_TOKEN secret / BALENA_FLEET variable not set — skipping deploy."
            exit 0
          fi
          balena login --token "$BALENA_TOKEN"
          balena push "$BALENA_FLEET" --source .
